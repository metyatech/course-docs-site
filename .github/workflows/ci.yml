name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: course-docs-site-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      build: ${{ steps.set-build-matrix.outputs.build }}
      e2e: ${{ steps.set-e2e-matrix.outputs.e2e }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Verify site manifest
        run: npm run verify:sites

      - name: Generate build matrix
        id: set-build-matrix
        run: echo "build=$(node scripts/print-course-sites-matrix.mjs --kind build)" >> $GITHUB_OUTPUT

      - name: Generate E2E matrix
        id: set-e2e-matrix
        run: echo "e2e=$(node scripts/print-course-sites-matrix.mjs --kind e2e)" >> $GITHUB_OUTPUT

  shared:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      COURSE_CONTENT_SOURCE: github:metyatech/javascript-course-docs#master
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Audit (high severity gate)
        run: npm run audit:ci

      - name: Verify (repeat-clean)
        run: npm run verify:repeat-clean

      - name: Verify (precommit)
        run: npm run verify:precommit

  build-course:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.build) }}
    env:
      COURSE_CONTENT_SOURCE: ${{ matrix.courseSource }}
      COURSE_DOCS_NEXT_DIST_DIR: .next-build-${{ matrix.siteId }}
      GH_TOKEN: ${{ secrets.COURSE_CONTENT_READ_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Validate private content read token
        if: ${{ matrix.requiresContentReadToken }}
        shell: bash
        env:
          CONTENT_READ_TOKEN: ${{ secrets.COURSE_CONTENT_READ_TOKEN }}
        run: |
          if [ -z "$CONTENT_READ_TOKEN" ]; then
            echo "::error::COURSE_CONTENT_READ_TOKEN is required to read private course content repositories."
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Build (verified)
        run: npm run build:verified

  e2e-course:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.e2e) }}
    env:
      COURSE_CONTENT_SOURCE: ${{ matrix.courseSource }}
      COURSE_DOCS_NEXT_DIST_DIR: .next-e2e-${{ matrix.siteId }}
      E2E_PORT: ${{ matrix.e2ePort }}
      PLAYWRIGHT_MAX_FAILURES: "1"
      GH_TOKEN: ${{ secrets.COURSE_CONTENT_READ_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Validate private content read token
        if: ${{ matrix.requiresContentReadToken }}
        shell: bash
        env:
          CONTENT_READ_TOKEN: ${{ secrets.COURSE_CONTENT_READ_TOKEN }}
        run: |
          if [ -z "$CONTENT_READ_TOKEN" ]; then
            echo "::error::COURSE_CONTENT_READ_TOKEN is required to read private course content repositories."
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Build (verified)
        run: npm run build:verified

      - name: Run course E2E (CI)
        run: npm run test:course:ci
