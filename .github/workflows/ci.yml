name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: course-docs-site-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  shared:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Verify shared tests
        run: npm run test:shared

  verify-course:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - courseSource: "github:metyatech/javascript-course-docs#master"
            e2ePort: 3101
          - courseSource: "github:metyatech/programming-course-docs#master"
            e2ePort: 3102
          - courseSource: "github:metyatech/open-campus-unreal-90min#main"
            e2ePort: 3103
    env:
      COURSE_CONTENT_SOURCE: ${{ matrix.courseSource }}
      E2E_PORT: ${{ matrix.e2ePort }}
      PLAYWRIGHT_MAX_FAILURES: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Cache Playwright Chromium
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify course matrix entry
        run: npm run verify:course
