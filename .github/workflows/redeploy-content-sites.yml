name: Redeploy content sites

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: course-docs-site-redeploy-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  prepare-matrix:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      site_sha: ${{ steps.set-sha.outputs.site_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Verify site manifest
        run: npm run verify:sites

      - name: Generate redeploy matrix
        id: set-matrix
        run: echo "matrix=$(node scripts/print-course-sites-matrix.mjs --kind redeploy)" >> $GITHUB_OUTPUT

      - name: Record site SHA
        id: set-sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "site_sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          else
            echo "site_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Record summary
        run: |
          echo "## Site SHA" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.set-sha.outputs.site_sha }}" >> $GITHUB_STEP_SUMMARY

  dispatch:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    name: Dispatch ${{ matrix.repo }}
    steps:
      - name: Validate dispatch token
        env:
          GH_TOKEN: ${{ secrets.COURSE_CONTENT_REDEPLOY_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "Missing required secret: COURSE_CONTENT_REDEPLOY_TOKEN"
            exit 1
          fi

      - name: Trigger content deploy workflow
        env:
          GH_TOKEN: ${{ secrets.COURSE_CONTENT_REDEPLOY_TOKEN }}
        run: |
          echo "Dispatching ${{ matrix.workflow }} for ${{ matrix.repo }} @ ${{ matrix.ref }}"
          gh workflow run "${{ matrix.workflow }}" --repo "metyatech/${{ matrix.repo }}" --ref "${{ matrix.ref }}"

      - name: Record dispatch summary
        if: always()
        env:
          SITE_ID: ${{ matrix.siteId }}
          REPO: ${{ matrix.repo }}
          REF: ${{ matrix.ref }}
          WORKFLOW: ${{ matrix.workflow }}
          SITE_SHA: ${{ needs.prepare-matrix.outputs.site_sha }}
        run: |
          echo "## Dispatch ${{ matrix.siteId }}" >> $GITHUB_STEP_SUMMARY
          echo "- siteId: ${{ matrix.siteId }}" >> $GITHUB_STEP_SUMMARY
          echo "- repo: metyatech/${{ matrix.repo }}" >> $GITHUB_STEP_SUMMARY
          echo "- ref: ${{ matrix.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- workflow: ${{ matrix.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "- site_sha: ${{ needs.prepare-matrix.outputs.site_sha }}" >> $GITHUB_STEP_SUMMARY
